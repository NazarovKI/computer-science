title: "computer-science"
description: уроки информатики
author: "Кирилл Назаров"
remote_theme: pages-themes/hacker@v0.2.0
plugins:
- jekyll-remote-theme # add this line to the plugins list if you already have one
- jekyll-readme-index
- jekyll-github-metadata

# Для GitHub Pages (проектный сайт)
baseurl: "/computer-science"
url: "https://nazarovki.github.io"

# Настройки по умолчанию
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      type: "posts"
    values:
      # Это ключ! Посты будут по адресу /2026/07/05/go/
      permalink: "/:year/:month/:day/:title/"

# _config.yml

# ... остальные настройки (title, description и т.д.) ...

# Настройка коллекции для уроков
collections:
  lessons:
    output: true
    permalink: /:collection/:path/
